<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support AI - Yönlendiriliyor...</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #0f172a; 
            color: white; 
            margin: 0; 
        }
        .container { text-align: center; }
        .loader { 
            border: 4px solid #1e293b; 
            border-top: 4px solid #38bdf8; 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 20px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <p>Support AI Mağazasına Yönlendiriliyorsunuz...</p>
    </div>

    <script>
        (function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // iOS - Apple App Store
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                window.location.href = "https://apps.apple.com/tr/app/support-ai/id6759504026";
            } 
            // Android - Google Play Store
            else if (/android/i.test(userAgent)) {
                window.location.href = "https://play.google.com/store/apps/details?id=com.supportai.app";
            } 
            // Masaüstü için GitHub profilin veya alternatif link
            else {
                window.location.href = "https://github.com/AbdulsamedKuzan"; 
            }
        })();
    </script>
</body>
</html>
